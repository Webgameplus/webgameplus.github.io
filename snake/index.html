<style>
  :root {
    --bg:#0a0a0f; --panel:#111118; --border:#1e1e2e;
    --snake:#00ff88; --food:#ff4466; --text:#e0e0ff; --muted:#555577; --accent:#00ff88;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#00ff8811 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#ff446611 0%,transparent 50%);pointer-events:none;z-index:0;}

  /* NAV */
  nav{position:relative;z-index:10;width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);}
  .nav-home{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:1px;transition:color 0.2s;}
  .nav-home:hover{color:var(--accent);}
  .nav-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent);text-shadow:0 0 10px var(--accent);}

  /* AD SLOTS */
  .ad-slot{width:100%;max-width:728px;min-height:90px;background:var(--panel);border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;letter-spacing:3px;opacity:0.4;margin:12px auto;}

  .wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 20px;width:100%;}

  h1{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,22px);color:var(--accent);text-shadow:0 0 20px var(--accent),0 0 40px var(--accent);letter-spacing:2px;animation:flicker 4s infinite;}
  @keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:0.8}97%{opacity:1}98%{opacity:0.6}99%{opacity:1}}

  .stats-bar{display:flex;gap:40px;align-items:center;}
  .stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-weight:600;}
  .stat-value{font-family:'Press Start 2P',monospace;font-size:clamp(12px,2.5vw,18px);color:var(--text);}
  #scoreVal{color:var(--accent);text-shadow:0 0 10px var(--accent);}
  #highVal{color:#ffcc00;text-shadow:0 0 10px #ffcc0088;}

  .game-container{position:relative;border:1px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:0 0 0 1px #00ff8822,0 0 40px #00ff8811,inset 0 0 40px #00000044;}
  canvas{display:block;background:#0d0d15;image-rendering:pixelated;}

  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0fee;gap:20px;transition:opacity 0.3s;}
  .overlay.hidden{display:none;}
  .overlay-title{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2vw,16px);color:var(--accent);text-shadow:0 0 20px var(--accent);text-align:center;line-height:2;}
  .overlay-sub{font-size:clamp(12px,2vw,16px);color:var(--muted);text-align:center;letter-spacing:1px;}
  .btn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.5vw,12px);padding:12px 28px;background:transparent;border:2px solid var(--accent);color:var(--accent);cursor:pointer;letter-spacing:2px;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn::before{content:'';position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 0.2s;z-index:-1;}
  .btn:hover{color:var(--bg);box-shadow:0 0 20px var(--accent);}
  .btn:hover::before{transform:scaleX(1);}

  .mobile-controls{display:none;flex-direction:column;align-items:center;gap:4px;margin-top:4px;}
  .mobile-row{display:flex;gap:4px;}
  .dpad{width:52px;height:52px;border:2px solid var(--border);border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:all 0.1s;touch-action:manipulation;}
  .dpad:active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  @media(max-width:600px){.mobile-controls{display:flex;}}

  .ad-slot-rect{width:100%;max-width:340px;min-height:280px;background:var(--panel);border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;letter-spacing:3px;opacity:0.4;margin:0 auto;}
</style>

  <a class="nav-home" href="../index.html">← HOME</a>

<!-- AD TOP (728x90 leaderboard) -->
<div style="width:100%;max-width:728px;padding:12px 20px 0;margin:0 auto;">
  <!-- Replace with your ad code -->
  <div class="ad-slot">ADVERTISEMENT</div>
</div>

<div class="wrapper">
  <h1>🐍 SNAKE</h1>

  <div class="stats-bar">
    <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="scoreVal">0</span></div>
    <div class="stat"><span class="stat-label">Best</span><span class="stat-value" id="highVal">0</span></div>
    <div class="stat"><span class="stat-label">Level</span><span class="stat-value" id="levelVal">1</span></div>
  </div>

  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="startScreen">
      <div class="overlay-title">SNAKE<br>GAME</div>
      <div class="overlay-sub">Eat food. Grow longer.<br>Don't hit the walls!</div>
      <button class="btn" id="startBtn">▶ START</button>
    </div>
    <div class="overlay hidden" id="gameOverScreen">
      <div class="overlay-title">GAME<br>OVER</div>
      <div class="overlay-sub" id="finalScore"></div>
      <button class="btn" id="restartBtn">↺ RETRY</button>
    </div>
    <div class="overlay hidden" id="pauseScreen">
      <div class="overlay-title">PAUSED</div>
      <button class="btn" id="resumeBtn">▶ RESUME</button>
    </div>
  </div>

  <!-- Mobile D-Pad -->
  <div class="mobile-controls">
    <div class="mobile-row"><div class="dpad" id="up">▲</div></div>
    <div class="mobile-row"><div class="dpad" id="left">◀</div><div class="dpad" id="down">▼</div><div class="dpad" id="right">▶</div></div>
  </div>

  <!-- AD MIDDLE (336x280 rectangle) — best performing spot -->
  <!-- Replace with your ad code -->
  <div class="ad-slot-rect">ADVERTISEMENT</div>

</div>

<!-- AD BOTTOM (728x90) -->
<div style="width:100%;max-width:728px;padding:0 20px 20px;margin:0 auto;">
  <!-- Replace with your ad code -->
  <div class="ad-slot">ADVERTISEMENT</div>
</div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const COLS=20,ROWS=20;let CELL;
function resize(){const maxW=Math.min(window.innerWidth-48,480),maxH=Math.min(window.innerHeight-320,480),size=Math.floor(Math.min(maxW,maxH)/COLS)*COLS;canvas.width=size;canvas.height=size;CELL=size/COLS;}
resize();window.addEventListener('resize',()=>{resize();if(!running)draw();});

let snake,dir,nextDir,food,score,highScore,running,paused,gameLoop,level,frameRate;
highScore=parseInt(localStorage.getItem('snakeHigh')||'0');
document.getElementById('highVal').textContent=highScore;

function init(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};score=0;level=1;frameRate=150;running=true;paused=false;
  placeFood();updateStats();
}

function placeFood(){let pos;do{pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===pos.x&&s.y===pos.y));food=pos;}

function update(){
  if(!running||paused)return;
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){endGame();return;}
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=level*10;
    if(score>highScore){highScore=score;localStorage.setItem('snakeHigh',highScore);}
    if(snake.length%5===0){level=Math.min(level+1,10);frameRate=Math.max(60,150-(level-1)*10);restartLoop();}
    placeFood();updateStats();
  }else{snake.pop();}
  draw();
}

function draw(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#ffffff06';ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,H);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(W,i*CELL);ctx.stroke();}
  const pulse=0.7+0.3*Math.sin(Date.now()/200);
  ctx.shadowBlur=20*pulse;ctx.shadowColor='#ff4466';ctx.fillStyle='#ff4466';
  ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL*0.38,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  snake.forEach((seg,i)=>{
    const t=i/snake.length,g=Math.floor(255*(1-t*0.5));
    ctx.fillStyle=i===0?'#00ff88':`rgb(0,${g},${Math.floor(g*0.5)})`;
    if(i===0){ctx.shadowBlur=15;ctx.shadowColor='#00ff88';}
    const pad=i===0?1:2,r=i===0?3:2;
    roundRect(ctx,seg.x*CELL+pad,seg.y*CELL+pad,CELL-pad*2,CELL-pad*2,r);ctx.fill();ctx.shadowBlur=0;
    if(i===0){
      ctx.fillStyle='#0a0a0f';
      const ex=seg.x*CELL+CELL/2,ey=seg.y*CELL+CELL/2,eo=CELL*0.18,es=CELL*0.1;
      let e1,e2;
      if(dir.x===1){e1={x:ex+eo,y:ey-eo};e2={x:ex+eo,y:ey+eo};}
      else if(dir.x===-1){e1={x:ex-eo,y:ey-eo};e2={x:ex-eo,y:ey+eo};}
      else if(dir.y===-1){e1={x:ex-eo,y:ey-eo};e2={x:ex+eo,y:ey-eo};}
      else{e1={x:ex-eo,y:ey+eo};e2={x:ex+eo,y:ey+eo};}
      ctx.beginPath();ctx.arc(e1.x,e1.y,es,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2.x,e2.y,es,0,Math.PI*2);ctx.fill();
    }
  });
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function updateStats(){document.getElementById('scoreVal').textContent=score;document.getElementById('highVal').textContent=highScore;document.getElementById('levelVal').textContent=level;}
function endGame(){running=false;clearInterval(gameLoop);document.getElementById('finalScore').textContent=`Score: ${score}  |  Best: ${highScore}`;document.getElementById('gameOverScreen').classList.remove('hidden');}
function restartLoop(){clearInterval(gameLoop);gameLoop=setInterval(update,frameRate);}
function startGame(){document.getElementById('startScreen').classList.add('hidden');document.getElementById('gameOverScreen').classList.add('hidden');init();restartLoop();}

document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':case'w':case'W':if(dir.y!==1)nextDir={x:0,y:-1};e.preventDefault();break;
    case'ArrowDown':case's':case'S':if(dir.y!==-1)nextDir={x:0,y:1};e.preventDefault();break;
    case'ArrowLeft':case'a':case'A':if(dir.x!==1)nextDir={x:-1,y:0};e.preventDefault();break;
    case'ArrowRight':case'd':case'D':if(dir.x!==-1)nextDir={x:1,y:0};e.preventDefault();break;
    case'p':case'P':if(!running)return;paused=!paused;document.getElementById('pauseScreen').classList.toggle('hidden',!paused);break;
  }
});

function mobileDir(d){if(!running||paused)return;if(d==='up'&&dir.y!==1)nextDir={x:0,y:-1};if(d==='down'&&dir.y!==-1)nextDir={x:0,y:1};if(d==='left'&&dir.x!==1)nextDir={x:-1,y:0};if(d==='right'&&dir.x!==-1)nextDir={x:1,y:0};}
['up','down','left','right'].forEach(d=>{const el=document.getElementById(d);el.addEventListener('touchstart',e=>{e.preventDefault();mobileDir(d);},{passive:false});el.addEventListener('click',()=>mobileDir(d));});
let tx,ty;canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){if(dx>20)mobileDir('right');else if(dx<-20)mobileDir('left');}else{if(dy>20)mobileDir('down');else if(dy<-20)mobileDir('up');}},{passive:true});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
document.getElementById('resumeBtn').addEventListener('click',()=>{paused=false;document.getElementById('pauseScreen').classList.add('hidden');});
// Initialize defaults so draw() doesn't crash before game starts
snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
dir={x:1,y:0}; nextDir={x:1,y:0};
food={x:15,y:10};
score=0; level=1; running=false;
draw();
</script>
</body>
