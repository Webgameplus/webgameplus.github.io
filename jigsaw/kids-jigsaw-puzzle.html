<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Puzzle Party! — Level Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@500;700;800&display=swap');

:root{
  --gold:#FFD93D; --orange:#FF8E53; --red:#FF6B6B;
  --green:#6BCB77; --blue:#4D96FF; --purple:#C77DFF;
  --dark:#1a1a2e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;min-height:100vh;}

#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

.screen{display:none;position:relative;z-index:10;width:100%;}
.screen.active{display:flex;flex-direction:column;align-items:center;min-height:100vh;}

/* ══ MENU ══ */
#menuScreen{justify-content:flex-start;padding:30px 16px 50px;gap:22px;background:transparent;}
.logo-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(40px,9vw,78px);
  background:linear-gradient(135deg,#FFD93D,#FF8E53,#FF6B6B);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 4px 16px rgba(255,150,50,.45));
  text-align:center;line-height:1.1;
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 4px 16px rgba(255,150,50,.45));}50%{filter:drop-shadow(0 6px 28px rgba(255,200,50,.8));}}
.logo-sub{font-family:'Fredoka One',cursive;font-size:18px;color:rgba(255,255,255,.55);text-align:center;margin-top:-6px;}

.level-map{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;width:100%;max-width:780px;padding:4px 4px 20px;
}
.level-card{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  border-radius:20px;padding:14px 10px;cursor:pointer;
  transition:transform .2s,box-shadow .2s,background .2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden;
}
.level-card:hover{transform:translateY(-5px) scale(1.03);background:rgba(255,255,255,.14);box-shadow:0 14px 36px rgba(0,0,0,.5);}
.level-card:active{transform:scale(.97);}
.level-card.locked{cursor:not-allowed;opacity:.4;filter:grayscale(.9);}
.level-card.locked:hover{transform:none;box-shadow:none;}
.level-card.completed{border-color:rgba(107,203,119,.5);background:rgba(107,203,119,.08);}
.level-card.current{border-color:rgba(255,217,61,.6);background:rgba(255,217,61,.09);box-shadow:0 0 20px rgba(255,217,61,.25);}
.lc-thumb{width:110px;height:70px;border-radius:12px;overflow:hidden;background:#222;box-shadow:0 4px 12px rgba(0,0,0,.4);position:relative;}
.lc-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.lc-lock-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:28px;}
.lc-num{font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,.45);}
.lc-name{font-family:'Fredoka One',cursive;font-size:15px;color:#fff;text-align:center;}
.lc-diff{font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px;color:#fff;}
.lc-diff.easy{background:#6BCB77;}
.lc-diff.medium{background:#FFD93D;color:#444;}
.lc-diff.hard{background:#FF8E53;}
.lc-diff.expert{background:#FF6B6B;}
.lc-stars{display:flex;gap:2px;font-size:16px;}
.lc-stars .lit{filter:drop-shadow(0 0 4px gold);}
.lc-stars .dim{filter:grayscale(1) opacity(.3);}

/* ══ LOADING ══ */
#loadScreen{justify-content:center;align-items:center;gap:24px;}
.load-title{font-family:'Fredoka One',cursive;font-size:32px;color:#fff;text-align:center;}
.load-bar-wrap{width:280px;height:16px;background:rgba(255,255,255,.12);border-radius:50px;overflow:hidden;}
.load-bar{height:100%;background:linear-gradient(90deg,#FFD93D,#FF8E53);border-radius:50px;width:0%;transition:width .25s;}
.load-tip{font-size:15px;color:rgba(255,255,255,.45);text-align:center;max-width:280px;}

/* ══ GAME ══ */
#gameScreen{padding:10px 10px 20px;gap:10px;}
.hud{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:980px;
  background:rgba(255,255,255,.06);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:18px;
  padding:10px 16px;gap:8px;flex-wrap:wrap;
}
.hud-item{display:flex;align-items:center;gap:6px;font-family:'Fredoka One',cursive;font-size:20px;color:#fff;}
.lvl-badge{font-family:'Fredoka One',cursive;font-size:13px;background:linear-gradient(135deg,#FFD93D,#FF8E53);color:#1a1a2e;padding:4px 14px;border-radius:50px;box-shadow:0 2px 8px rgba(255,180,50,.35);}
.star-display{display:flex;gap:2px;}
.star-icon{font-size:22px;transition:all .3s;}
.star-icon.lit{filter:drop-shadow(0 0 5px gold);}
.star-icon.dim{filter:grayscale(1) opacity(.3);}
.progress-wrap{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.2);border-radius:50px;padding:5px 12px;}
.progress-bar-bg{width:90px;height:8px;background:rgba(255,255,255,.12);border-radius:50px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#6BCB77,#FFD93D);border-radius:50px;transition:width .4s ease;}
.btn-hud{font-family:'Fredoka One',cursive;font-size:15px;padding:7px 14px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);transition:all .15s;}
.btn-hud:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25);}
.btn-back{background:#FF6B6B;color:#fff;}
.btn-peek{background:#C77DFF;color:#fff;}
.btn-hint{background:#FFD93D;color:#1a1a2e;}

.game-area{display:flex;gap:14px;width:100%;max-width:980px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
.board-wrapper{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;}
.tray-wrapper{flex:1;min-width:170px;display:flex;flex-direction:column;gap:6px;}
.area-label{font-family:'Fredoka One',cursive;font-size:16px;color:rgba(255,255,255,.6);}
#boardContainer{
  position:relative;
  background:rgba(255,255,255,.03);
  border:2px dashed rgba(255,255,255,.12);
  border-radius:16px;padding:4px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.board-cell{
  position:absolute;
  border-radius:4px;
  transition:background .2s,border .2s;
  border:2px dashed rgba(255,255,255,.08);
  overflow:visible;
}
.board-cell.over{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.35);}
.board-cell.done{border-color:transparent;}

#pieceTray{
  background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.12);
  border-radius:16px;padding:10px;
  display:flex;flex-wrap:wrap;gap:6px;
  min-height:160px;align-content:flex-start;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  max-height:calc(100vh - 200px);overflow-y:auto;
}
.piece-wrap{
  cursor:grab;
  transition:transform .15s,filter .15s;
  flex-shrink:0;
  display:block;
  touch-action:none;
}
.piece-wrap:hover{transform:scale(1.08) rotate(-2deg);filter:brightness(1.1) drop-shadow(0 6px 14px rgba(0,0,0,.7));}
.piece-wrap.dragging-piece{opacity:.25;cursor:grabbing;}
.piece-wrap.hint-flash{animation:hintFlash .55s ease-in-out 4;}
@keyframes hintFlash{0%,100%{filter:brightness(1);}50%{filter:brightness(1.3) drop-shadow(0 0 16px #FFD93D);}}
.piece-wrap canvas{display:block;pointer-events:none;}

#dragGhost{position:fixed;pointer-events:none;z-index:9999;display:none;filter:drop-shadow(0 14px 28px rgba(0,0,0,.7));transform:scale(1.1) rotate(3deg);}

/* ══ TRANSITION ══ */
#transScreen{justify-content:center;align-items:center;gap:18px;padding:30px 16px;}
.trans-title{font-family:'Fredoka One',cursive;font-size:clamp(38px,9vw,72px);color:#FFD93D;text-align:center;animation:transBounce .65s ease-in-out infinite alternate;}
@keyframes transBounce{from{transform:scale(1) rotate(-1deg);}to{transform:scale(1.05) rotate(1deg);}}
.trans-stars{display:flex;gap:12px;font-size:52px;}
.trans-star{animation:starPop .4s ease-out both;}
.trans-star:nth-child(2){animation-delay:.18s;}
.trans-star:nth-child(3){animation-delay:.36s;}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);}80%{transform:scale(1.3) rotate(8deg);}100%{transform:scale(1) rotate(0deg);}}
.trans-card{background:rgba(255,255,255,.07);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:26px 34px;display:flex;flex-direction:column;gap:14px;align-items:center;min-width:260px;}
.trans-stat{font-family:'Fredoka One',cursive;font-size:21px;color:#fff;}
.trans-next-preview{width:200px;height:126px;border-radius:14px;overflow:hidden;border:3px solid rgba(255,255,255,.18);box-shadow:0 8px 24px rgba(0,0,0,.5);position:relative;}
.trans-next-preview img{width:100%;height:100%;object-fit:cover;}
.trans-next-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);font-family:'Fredoka One',cursive;font-size:13px;color:#fff;padding:6px;text-align:center;}
.btn-next{font-family:'Fredoka One',cursive;font-size:24px;padding:15px 46px;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(135deg,#6BCB77,#4CAF50);color:#fff;box-shadow:0 6px 0 rgba(0,0,0,.25);transition:all .15s;animation:pulseBtn 1.5s ease-in-out infinite;}
@keyframes pulseBtn{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.btn-next:active{transform:scale(.97) translateY(4px);animation:none;box-shadow:0 2px 0 rgba(0,0,0,.25);}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-menu-link{font-family:'Fredoka One',cursive;font-size:19px;padding:11px 30px;border:none;border-radius:50px;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);box-shadow:0 4px 0 rgba(0,0,0,.2);transition:all .15s;}
.btn-menu-link:active{transform:translateY(3px);}
.all-done-badge{font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#FFD93D,#FF8E53);color:#1a1a2e;padding:10px 22px;border-radius:50px;box-shadow:0 4px 14px rgba(255,180,50,.4);text-align:center;}

/* ══ PREVIEW ══ */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:5000;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.preview-overlay.show{display:flex;}
.btn-close-preview{font-family:'Fredoka One',cursive;font-size:19px;background:#fff;border:none;padding:11px 30px;border-radius:50px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);}

/* ══ EFFECTS ══ */
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg) scale(1);opacity:1;}100%{transform:translateY(110vh) rotate(800deg) scale(.5);opacity:0;}}
.score-popup{position:fixed;font-family:'Fredoka One',cursive;font-size:26px;pointer-events:none;z-index:9998;animation:scoreFloat 1.2s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.5);}
@keyframes scoreFloat{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-90px) scale(1.4);opacity:0;}}
.snap-burst{position:absolute;pointer-events:none;z-index:200;animation:burstAnim .45s ease-out forwards;font-size:22px;line-height:1;}
@keyframes burstAnim{0%{transform:scale(.4);opacity:1;}100%{transform:scale(2.6);opacity:0;}}
@keyframes snapBounce{0%{transform:scale(1.18) rotate(2deg);}60%{transform:scale(.95);}100%{transform:scale(1) rotate(0deg);}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.04);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px;}

@media(max-width:640px){
  .game-area{flex-direction:column;}
  .tray-wrapper{width:100%;}
  #pieceTray{max-height:220px;}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- ══ MENU ══ -->
<div id="menuScreen" class="screen active">
  <div style="text-align:center;padding-top:8px;">
    <div class="logo-title">🧩 Puzzle Party!</div>
    <div class="logo-sub">Real jigsaw shapes · 15 levels · Realistic photos 📸</div>
  </div>
  <div style="font-family:'Fredoka One',cursive;font-size:21px;color:rgba(255,255,255,.75);align-self:flex-start;padding:0 8px;width:100%;max-width:780px;">
    🗺️ Level Map
    <span id="totalStarsDisplay" style="float:right;font-size:17px;color:#FFD93D;">⭐ <span id="totalStarsNum">0</span>&nbsp;/&nbsp;45</span>
  </div>
  <div class="level-map" id="levelMap"></div>
</div>

<!-- ══ LOADING ══ -->
<div id="loadScreen" class="screen">
  <div class="load-title" id="loadTitle">🧩 Loading Puzzle…</div>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
  <div class="load-tip" id="loadTip">Get ready to snap those pieces!</div>
</div>

<!-- ══ GAME ══ -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <button class="btn-hud btn-back" onclick="goMenu()">⬅ Menu</button>
    <div class="lvl-badge" id="levelBadge">Level 1</div>
    <div class="hud-item">⏱️ <span id="timerDisplay">0:00</span></div>
    <div class="progress-wrap">
      <span style="font-size:16px;color:#fff;font-family:'Fredoka One',cursive;">🧩</span>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <span style="font-family:'Fredoka One',cursive;font-size:15px;color:#fff;" id="progressText">0%</span>
    </div>
    <div class="hud-item">
      <div class="star-display">
        <span class="star-icon lit" id="star1">⭐</span>
        <span class="star-icon lit" id="star2">⭐</span>
        <span class="star-icon lit" id="star3">⭐</span>
      </div>
    </div>
    <button class="btn-hud btn-peek" onclick="showPreview()">👁️ Peek</button>
    <button class="btn-hud btn-hint" onclick="useHint()">💡 Hint</button>
  </div>
  <div class="game-area">
    <div class="board-wrapper">
      <div class="area-label">📋 Drop pieces here!</div>
      <div id="boardContainer"></div>
    </div>
    <div class="tray-wrapper">
      <div class="area-label">🎒 Your pieces!</div>
      <div id="pieceTray"></div>
    </div>
  </div>
</div>

<!-- ══ TRANSITION ══ -->
<div id="transScreen" class="screen">
  <div class="trans-title" id="transTitle">🎉 LEVEL CLEAR!</div>
  <div class="trans-stars" id="transStars"></div>
  <div class="trans-card">
    <div class="trans-stat" id="transTime">⏱️ --</div>
    <div class="trans-stat" id="transScore">🏆 --</div>
    <div id="nextPreviewWrap" style="display:flex;flex-direction:column;align-items:center;gap:8px;"></div>
  </div>
  <div class="btn-row">
    <button class="btn-next" id="btnNext" onclick="goNextLevel()">▶ Next Level!</button>
    <button class="btn-menu-link" onclick="goMenu()">🏠 Menu</button>
  </div>
</div>

<!-- ══ PREVIEW ══ -->
<div class="preview-overlay" id="previewOverlay">
  <canvas id="previewCanvas" style="max-width:min(92vw,520px);max-height:min(92vw,520px);border-radius:18px;box-shadow:0 12px 48px rgba(0,0,0,.8);display:block;"></canvas>
  <button class="btn-close-preview" onclick="hidePreview()">✖ Close</button>
</div>

<!-- Drag ghost -->
<canvas id="dragGhost"></canvas>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LEVEL DATA  (15 levels)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SCENE PAINTERS — all drawn on Canvas, no external URLs!
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

//  PROGRESS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadProgress(){try{return JSON.parse(localStorage.getItem('pzProgress')||'{}');}catch(e){return{};}}
function saveProgress(p){try{localStorage.setItem('pzProgress',JSON.stringify(p));}catch(e){}}
let progress = loadProgress();

function getMaxUnlocked(){
  let max=1;
  for(let i=1;i<=15;i++){
    if(progress[i]&&progress[i].stars>=1) max=Math.min(i+1,15);
    else break;
  }
  return max;
}
function totalStars(){return Object.values(progress).reduce((s,v)=>s+(v.stars||0),0);}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  MENU
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildMenu(){
  const unlocked = getMaxUnlocked();
  document.getElementById('totalStarsNum').textContent = totalStars();
  const map = document.getElementById('levelMap');
  map.innerHTML='';
  LEVELS.forEach(lvl=>{
    const done = !!progress[lvl.id];
    const isUnlocked = lvl.id<=unlocked;
    const isCurrent  = lvl.id===unlocked && !done;
    const stars = done?(progress[lvl.id].stars||0):0;
    const card = document.createElement('div');
    card.className='level-card'+(done?' completed':'')+(isCurrent?' current':'')+(!isUnlocked?' locked':'');
    card.innerHTML=`
      <div class="lc-num">Level ${lvl.id}</div>
      <div class="lc-thumb" id="thumb-${lvl.id}">
        ${!isUnlocked?'<div class="lc-lock-overlay">🔒</div>':''}
      </div>
      <div class="lc-name">${lvl.name}</div>
      <div class="lc-diff ${lvl.diff}">${lvl.diff[0].toUpperCase()+lvl.diff.slice(1)} ${lvl.grid}×${lvl.grid}</div>
      <div class="lc-stars">
        ${[1,2,3].map(i=>`<span class="${i<=stars?'lit':'dim'}">${i<=stars?'⭐':'☆'}</span>`).join('')}
      </div>`;
    if(isUnlocked) card.onclick=()=>loadLevel(lvl.id);
    map.appendChild(card);
    // Draw scene thumbnail into the thumb div
    const thumbDiv=card.querySelector(`#thumb-${lvl.id}`);
    const tcv=getSceneCanvas(lvl.pi,110,70);
    tcv.style.cssText='width:100%;height:100%;display:block;border-radius:12px;';
    thumbDiv.insertBefore(tcv,thumbDiv.firstChild);
  });
}

//  JIGSAW PATH MATH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildConnectors(cols,rows){
  const h=Array.from({length:rows},()=>Array.from({length:cols-1},()=>Math.random()<.5?1:-1));
  const v=Array.from({length:rows-1},()=>Array.from({length:cols},()=>Math.random()<.5?1:-1));
  return{h,v};
}

function getSides(r,c,cols,rows,conn){
  const top    = r===0      ? 0 : -conn.v[r-1][c];
  const right  = c===cols-1 ? 0 :  conn.h[r][c];
  const bottom = r===rows-1 ? 0 :  conn.v[r][c];
  const left   = c===0      ? 0 : -conn.h[r][c-1];
  return[top,right,bottom,left];
}

// Draw jigsaw outline path. ox,oy = top-left in canvas coords.
function drawJigsawPath(ctx, ox, oy, sz, sides, tab){
  const[sT,sR,sB,sL]=sides;
  const bulge = tab;

  ctx.beginPath();
  // — TOP —
  ctx.moveTo(ox,oy);
  if(sT===0){
    ctx.lineTo(ox+sz,oy);
  } else {
    const mx=ox+sz/2, d=sT;
    ctx.lineTo(mx-sz*.22,oy);
    ctx.bezierCurveTo(mx-sz*.22,oy-d*bulge*.55, mx-sz*.14,oy-d*bulge, mx,oy-d*bulge);
    ctx.bezierCurveTo(mx+sz*.14,oy-d*bulge, mx+sz*.22,oy-d*bulge*.55, mx+sz*.22,oy);
    ctx.lineTo(ox+sz,oy);
  }
  // — RIGHT —
  if(sR===0){
    ctx.lineTo(ox+sz,oy+sz);
  } else {
    const my=oy+sz/2, d=sR;
    ctx.lineTo(ox+sz,my-sz*.22);
    ctx.bezierCurveTo(ox+sz+d*bulge*.55,my-sz*.22, ox+sz+d*bulge,my-sz*.14, ox+sz+d*bulge,my);
    ctx.bezierCurveTo(ox+sz+d*bulge,my+sz*.14, ox+sz+d*bulge*.55,my+sz*.22, ox+sz,my+sz*.22);
    ctx.lineTo(ox+sz,oy+sz);
  }
  // — BOTTOM (right→left) —
  if(sB===0){
    ctx.lineTo(ox,oy+sz);
  } else {
    const mx=ox+sz/2, d=-sB;
    ctx.lineTo(mx+sz*.22,oy+sz);
    ctx.bezierCurveTo(mx+sz*.22,oy+sz-d*bulge*.55, mx+sz*.14,oy+sz-d*bulge, mx,oy+sz-d*bulge);
    ctx.bezierCurveTo(mx-sz*.14,oy+sz-d*bulge, mx-sz*.22,oy+sz-d*bulge*.55, mx-sz*.22,oy+sz);
    ctx.lineTo(ox,oy+sz);
  }
  // — LEFT (bottom→top) —
  if(sL===0){
    ctx.lineTo(ox,oy);
  } else {
    const my=oy+sz/2, d=-sL;
    ctx.lineTo(ox,my+sz*.22);
    ctx.bezierCurveTo(ox+d*bulge*.55,my+sz*.22, ox+d*bulge,my+sz*.14, ox+d*bulge,my);
    ctx.bezierCurveTo(ox+d*bulge,my-sz*.14, ox+d*bulge*.55,my-sz*.22, ox,my-sz*.22);
    ctx.lineTo(ox,oy);
  }
  ctx.closePath();
}

// Render a single piece to a canvas with padding for tab overflow
function renderPiece(srcImg, r, c, cellSz, sides, tab){
  const pad=tab+6;
  const W=cellSz+pad*2, H=cellSz+pad*2;
  const cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // clip
  ctx.save();
  drawJigsawPath(ctx,pad,pad,cellSz,sides,tab);
  ctx.clip();
  // draw image slice
  ctx.drawImage(srcImg, c*cellSz-pad, r*cellSz-pad, W, H, 0, 0, W, H);
  ctx.restore();

  // subtle bevel highlight
  ctx.save();
  drawJigsawPath(ctx,pad,pad,cellSz,sides,tab);
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2.5;
  ctx.stroke();
  ctx.restore();

  // outer shadow stroke
  ctx.save();
  drawJigsawPath(ctx,pad,pad,cellSz,sides,tab);
  ctx.strokeStyle='rgba(0,0,0,0.22)';
  ctx.lineWidth=3;
  ctx.stroke();
  ctx.restore();

  return{canvas:cv, pad};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GAME STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentLvlId=1, currentLvl=null;
let cols=3,rows=3,cellSz=110,tab=20;
let placedCount=0,totalPieces=0;
let elapsed=0,timerInt=null,t0=0;
let hints=0,curStars=3;
let conn=null, pieces=[], srcImg=null;

const TIPS=[
  'Start with the corners! 🔍',
  'Flat edges = border pieces! 📐',
  'Use the Peek button anytime! 👁️',
  'Matching colours helps a lot! 🎨',
  'Take your time — no rush! 😊',
  'Look for the tabs that match! 🧩',
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LOAD LEVEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadLevel(id){
  currentLvlId=id;
  currentLvl=LEVELS.find(l=>l.id===id);
  showScreen('loadScreen');
  document.getElementById('loadTitle').textContent=`🧩 Level ${id} — ${currentLvl.name}`;
  document.getElementById('loadTip').textContent=TIPS[Math.floor(Math.random()*TIPS.length)];
  document.getElementById('loadBar').style.width='0%';

  // Draw scene to a 600×600 canvas — no network needed!
  let p=0;
  const pi=setInterval(()=>{p+=18;if(p>=100){p=100;clearInterval(pi);}document.getElementById('loadBar').style.width=p+'%';},60);

  setTimeout(()=>{
    const sceneCv=getSceneCanvas(currentLvl.pi,600,600);
    srcImg=sceneCv; // renderPiece accepts canvas just like an Image

    // Also show preview
    const prevCv=document.getElementById('previewCanvas');
    if(prevCv){
      prevCv.width=600;prevCv.height=600;
      prevCv.getContext('2d').drawImage(sceneCv,0,0);
    }
    document.getElementById('loadBar').style.width='100%';
    setTimeout(buildGame,300);
  },400);
}

function buildGame(){
  cols=rows=currentLvl.grid;
  totalPieces=cols*rows;
  placedCount=0;hints=0;curStars=3;elapsed=0;

  // Responsive cell size
  const vw=window.innerWidth;
  const maxW=vw<660?vw-28:Math.min(vw-240,540);
  cellSz=Math.max(58,Math.min(120,Math.floor(maxW/cols)));
  tab=Math.round(cellSz*0.19);

  conn=buildConnectors(cols,rows);
  document.getElementById('levelBadge').textContent=`Lv ${currentLvl.id} — ${currentLvl.name}`;
  updateProgress();
  resetStars();
  buildBoard();
  buildPieces();
  buildTray();

  clearInterval(timerInt);
  t0=Date.now();
  timerInt=setInterval(tickTimer,1000);
  showScreen('gameScreen');
}

// ── BOARD ──
function buildBoard(){
  const cont=document.getElementById('boardContainer');
  cont.innerHTML='';
  cont.style.width=(cols*cellSz)+'px';
  cont.style.height=(rows*cellSz)+'px';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const cell=document.createElement('div');
      cell.className='board-cell';
      cell.dataset.idx=idx;
      cell.style.left=(c*cellSz)+'px';
      cell.style.top=(r*cellSz)+'px';
      cell.style.width=cellSz+'px';
      cell.style.height=cellSz+'px';

      // faint ghost shape
      const ghost=document.createElement('canvas');
      ghost.width=cellSz;ghost.height=cellSz;
      const gctx=ghost.getContext('2d');
      const sides=getSides(r,c,cols,rows,conn);
      drawJigsawPath(gctx,0,0,cellSz,sides,tab);
      gctx.fillStyle='rgba(255,255,255,.04)';gctx.fill();
      gctx.strokeStyle='rgba(255,255,255,.12)';gctx.lineWidth=1.5;gctx.stroke();
      cell.appendChild(ghost);

      cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('over');});
      cell.addEventListener('dragleave',()=>cell.classList.remove('over'));
      cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('over');
        const pi=parseInt(e.dataTransfer.getData('pi'));tryPlace(pi,idx);});
      cont.appendChild(cell);
    }
  }
}

// ── PIECES ──
function buildPieces(){
  pieces=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const sides=getSides(r,c,cols,rows,conn);
      const{canvas:cv,pad}=renderPiece(srcImg,r,c,cellSz,sides,tab);
      pieces.push({idx,r,c,sides,canvas:cv,pad,placed:false,trayEl:null});
    }
  }
}

// ── TRAY ──
function buildTray(){
  const tray=document.getElementById('pieceTray');
  tray.innerHTML='';
  const order=[...pieces.map(p=>p.idx)];
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}

  order.forEach(idx=>{
    const piece=pieces[idx];
    const wrap=document.createElement('div');
    wrap.className='piece-wrap';
    wrap.dataset.pi=idx;
    wrap.draggable=true;
    wrap.style.width=piece.canvas.width+'px';
    wrap.style.height=piece.canvas.height+'px';
    wrap.style.position='relative';

    const cv=document.createElement('canvas');
    cv.width=piece.canvas.width;cv.height=piece.canvas.height;
    cv.getContext('2d').drawImage(piece.canvas,0,0);
    wrap.appendChild(cv);

    wrap.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('pi',idx);
      wrap.classList.add('dragging-piece');
      playSound('pickup');
    });
    wrap.addEventListener('dragend',()=>wrap.classList.remove('dragging-piece'));
    wrap.addEventListener('touchstart',onTouchStart,{passive:false});
    wrap.addEventListener('touchmove',onTouchMove,{passive:false});
    wrap.addEventListener('touchend',onTouchEnd,{passive:false});

    tray.appendChild(wrap);
    piece.trayEl=wrap;
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PLACE LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function tryPlace(pieceIdx,cellIdx){
  if(isNaN(pieceIdx)||isNaN(cellIdx))return;
  const piece=pieces[pieceIdx];
  if(!piece||piece.placed)return;
  const cont=document.getElementById('boardContainer');
  const cell=cont.querySelector(`.board-cell[data-idx="${cellIdx}"]`);
  if(!cell)return;
  if(cell.querySelector('.placed-canvas'))return;

  if(pieceIdx===cellIdx){
    // ✅ Correct
    piece.placed=true;
    placedCount++;
    playSound('snap');
    if(piece.trayEl)piece.trayEl.remove();

    const cv=document.createElement('canvas');
    cv.width=piece.canvas.width;cv.height=piece.canvas.height;
    cv.getContext('2d').drawImage(piece.canvas,0,0);
    cv.className='placed-canvas';
    cv.style.cssText=`position:absolute;left:${-piece.pad}px;top:${-piece.pad}px;
      width:${piece.canvas.width}px;height:${piece.canvas.height}px;
      pointer-events:none;z-index:10;animation:snapBounce .35s ease-out;`;
    cell.appendChild(cv);
    cell.classList.add('done');

    const burst=document.createElement('div');
    burst.className='snap-burst';
    burst.style.cssText=`left:${cellSz/2-11}px;top:${cellSz/2-11}px;`;
    burst.textContent=['✨','🌟','💫','⭐'][Math.floor(Math.random()*4)];
    cell.appendChild(burst);
    setTimeout(()=>burst.remove(),500);

    showFloatingText('+10 ⭐','#FFD93D',cell);
    updateProgress();
    updateStars();
    if(placedCount===totalPieces)setTimeout(triggerWin,650);
  } else {
    // ❌ Wrong
    playSound('wrong');
    cell.style.background='rgba(255,70,70,.2)';
    setTimeout(()=>cell.style.background='',450);
    showFloatingText('❌ Nope!','#FF6B6B',cell);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  TOUCH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let tPieceIdx=-1, tWrapEl=null;

function onTouchStart(e){
  e.preventDefault();
  const wrap=e.currentTarget;
  tPieceIdx=parseInt(wrap.dataset.pi);
  tWrapEl=wrap;
  wrap.classList.add('dragging-piece');
  playSound('pickup');
  const piece=pieces[tPieceIdx];
  const ghost=document.getElementById('dragGhost');
  ghost.width=piece.canvas.width;ghost.height=piece.canvas.height;
  ghost.getContext('2d').drawImage(piece.canvas,0,0);
  ghost.style.display='block';
  ghost.style.width=piece.canvas.width+'px';
  ghost.style.height=piece.canvas.height+'px';
  const t=e.touches[0];
  ghost.style.left=(t.clientX-piece.canvas.width/2)+'px';
  ghost.style.top=(t.clientY-piece.canvas.height/2)+'px';
}
function onTouchMove(e){
  e.preventDefault();
  const ghost=document.getElementById('dragGhost');
  if(ghost.style.display==='none')return;
  const t=e.touches[0];
  const piece=pieces[tPieceIdx];
  ghost.style.left=(t.clientX-piece.canvas.width/2)+'px';
  ghost.style.top=(t.clientY-piece.canvas.height/2)+'px';
  document.querySelectorAll('.board-cell').forEach(c=>c.classList.remove('over'));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){const bc=el.closest?.('.board-cell');if(bc)bc.classList.add('over');}
}
function onTouchEnd(e){
  e.preventDefault();
  const ghost=document.getElementById('dragGhost');
  ghost.style.display='none';
  if(tWrapEl)tWrapEl.classList.remove('dragging-piece');
  document.querySelectorAll('.board-cell').forEach(c=>c.classList.remove('over'));
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el){const bc=el.closest?.('.board-cell');if(bc)tryPlace(tPieceIdx,parseInt(bc.dataset.idx));}
  tPieceIdx=-1;tWrapEl=null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  HUD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateProgress(){
  const pct=Math.round(placedCount/totalPieces*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=pct+'%';
}
function resetStars(){
  ['star1','star2','star3'].forEach(id=>document.getElementById(id).className='star-icon lit');
  curStars=3;
}
function updateStars(){
  const tl1=totalPieces*13, tl2=totalPieces*27;
  let s=3;
  if(hints>0)s=Math.min(s,2);
  if(elapsed>tl1)s=Math.min(s,2);
  if(elapsed>tl2)s=Math.min(s,1);
  curStars=Math.max(1,s);
  document.getElementById('star1').className='star-icon lit';
  document.getElementById('star2').className='star-icon '+(curStars>=2?'lit':'dim');
  document.getElementById('star3').className='star-icon '+(curStars>=3?'lit':'dim');
}
function tickTimer(){
  elapsed=Math.floor((Date.now()-t0)/1000);
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('timerDisplay').textContent=m+':'+(s<10?'0':'')+s;
  updateStars();
}
function useHint(){
  hints++;
  updateStars();
  const els=document.querySelectorAll('#pieceTray .piece-wrap');
  if(!els.length)return;
  const pick=els[Math.floor(Math.random()*els.length)];
  pick.classList.add('hint-flash');
  setTimeout(()=>pick.classList.remove('hint-flash'),2500);
  showFloatingText('💡 Hint! −⭐','#C77DFF');
}
function showPreview(){document.getElementById('previewOverlay').classList.add('show');}
function hidePreview(){document.getElementById('previewOverlay').classList.remove('show');}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  WIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function triggerWin(){
  clearInterval(timerInt);
  updateStars();
  const stars=curStars;
  const score=totalPieces*80+Math.max(0,800-elapsed*2)+stars*250;
  playSound('win');
  launchConfetti();

  if(!progress[currentLvlId]||progress[currentLvlId].stars<stars){
    progress[currentLvlId]={stars,time:elapsed,score};
    saveProgress(progress);
  }

  document.getElementById('transTitle').textContent=
    stars===3?'🎉 PERFECT! 🎉':stars===2?'🌟 GREAT JOB!':'✅ LEVEL CLEAR!';

  const se=document.getElementById('transStars');
  se.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span');
    s.className='trans-star';
    s.textContent=i<stars?'⭐':'☆';
    se.appendChild(s);
  }
  document.getElementById('transTime').textContent=`⏱️ Time: ${fmtTime(elapsed)}`;
  document.getElementById('transScore').textContent=`🏆 Score: ${score}`;

  const nxt=LEVELS.find(l=>l.id===currentLvlId+1);
  const npw=document.getElementById('nextPreviewWrap');
  npw.innerHTML='';
  const btnNxt=document.getElementById('btnNext');
  if(nxt){
    npw.innerHTML=`
      <div style="font-family:'Fredoka One',cursive;font-size:17px;color:rgba(255,255,255,.6);">Up Next 👇</div>
      <div class="trans-next-preview" id="nextPreviewInner">
        <div class="trans-next-label">Level ${nxt.id} — ${nxt.name} (${nxt.diff} ${nxt.grid}×${nxt.grid})</div>
      </div>`;
    // inject canvas
    const ncv=getSceneCanvas(nxt.pi,260,160);
    ncv.style.cssText='width:100%;border-radius:14px 14px 0 0;display:block;';
    document.getElementById('nextPreviewInner').insertBefore(ncv,document.getElementById('nextPreviewInner').firstChild);
    btnNxt.style.display='';
    btnNxt.textContent=`▶ Level ${nxt.id}!`;
  } else {
    npw.innerHTML=`<div class="all-done-badge">🏆 You completed ALL 15 levels! You're a Puzzle Master!</div>`;
    btnNxt.style.display='none';
  }
  showScreen('transScreen');
}

function goNextLevel(){
  const nid=currentLvlId+1;
  if(nid<=15)loadLevel(nid);else goMenu();
}
function fmtTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  FX
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showFloatingText(txt,col,ref){
  const el=document.createElement('div');
  el.className='score-popup';el.textContent=txt;el.style.color=col;
  if(ref){const rc=ref.getBoundingClientRect();el.style.left=(rc.left+rc.width/2-30)+'px';el.style.top=rc.top+'px';}
  else{el.style.left=(15+Math.random()*60)+'vw';el.style.top='55vh';}
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}
function launchConfetti(){
  const pal=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF8E53','#fff'];
  for(let i=0;i<110;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti-piece';
      const sz=7+Math.random()*14;
      const isCircle=Math.random()>.4;
      c.style.cssText=`left:${Math.random()*100}vw;top:-30px;width:${sz}px;height:${sz}px;
        background:${pal[Math.floor(Math.random()*pal.length)]};
        border-radius:${isCircle?'50%':'2px'};
        animation-duration:${1.7+Math.random()*2.2}s;
        animation-delay:${Math.random()*.7}s;`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),5000);
    },i*22);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SOUND
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function playSound(t){
  try{
    const ctx=ac();
    if(t==='snap'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(500,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(900,ctx.currentTime+.14);
      g.gain.setValueAtTime(.22,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.24);
      o.start();o.stop(ctx.currentTime+.25);
    } else if(t==='wrong'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(140,ctx.currentTime+.2);
      g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);
      o.start();o.stop(ctx.currentTime+.23);
    } else if(t==='pickup'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=360;
      g.gain.setValueAtTime(.07,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.09);
      o.start();o.stop(ctx.currentTime+.1);
    } else if(t==='win'){
      [523,659,784,1047,1319].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(.2,ctx.currentTime+i*.14);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.14+.28);
        o.start(ctx.currentTime+i*.14);o.stop(ctx.currentTime+i*.14+.3);
      });
    }
  }catch(e){}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ANIMATED STAR BG
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function(){
  const cv=document.getElementById('bgCanvas');
  const ctx=cv.getContext('2d');
  let stars=[];
  function resize(){
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    stars=[];
    for(let i=0;i<180;i++){
      stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,
        r:.4+Math.random()*1.8,sp:Math.random()*2,ph:Math.random()*Math.PI*2,
        col:Math.random()<.15?`hsl(${30+Math.random()*60},90%,75%)`:'white'});
    }
  }
  window.addEventListener('resize',resize);resize();
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.ph+=.008+s.sp*.004;
      const a=.15+.65*Math.abs(Math.sin(s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.col.includes('hsl')?s.col.replace(')',`,${a})`).replace('hsl','hsla'):`rgba(255,255,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  NAV
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goMenu(){
  clearInterval(timerInt);
  buildMenu();
